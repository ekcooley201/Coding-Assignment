<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Experiment</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #333; }
        .full-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 600px; }
        input { padding: 12px; font-size: 1rem; border: 2px solid #dee2e6; border-radius: 8px; margin-bottom: 1.5rem; width: 100%; box-sizing: border-box; outline: none; }
        button { padding: 12px 24px; font-size: 1rem; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        button:hover { background-color: #0056b3; }
        #task-canvas { display: none; background-color: #ffffff; cursor: crosshair; }
        #results-screen { display: none; overflow-y: auto; padding: 20px 0; }
        .chart-container { position: relative; margin: auto; height: 40vh; width: 100%; }
        .avg-highlight { color: #d9534f; font-weight: bold; font-size: 1.4rem; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="full-screen">
        <div class="card">
            <h1>Reaction Task</h1>
            <p>Click the 10 red circles as fast as possible.</p>
            <input type="text" id="participant-id" placeholder="Enter Participant ID (Optional)">
            <button onclick="initTask()">Start Task</button>
        </div>
    </div>

    <canvas id="task-canvas"></canvas>

    <div id="results-screen" class="full-screen">
        <div class="card">
            <h2>Results Analysis</h2>
            <div id="stats-summary" style="margin-bottom: 20px;">Fetching comparison data...</div>
            <div class="chart-container">
                <canvas id="rtHistogram"></canvas>
            </div>
            <button onclick="location.reload()" style="margin-top: 20px; background-color: #6c757d;">Restart</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxJtpruPGDAORjaSgxWIVd1vkY_0lS0TExF2bQLxZrepd2tCF3OTsA_60y1AeqU1fM4/exec";
        
        let participantId = "";
        let sessionRTs = [];
        let currentTrial = 0;
        const totalTrials = 10;
        let startTime = 0;
        let circle = { x: 0, y: 0, r: 50 };
        
        const canvas = document.getElementById('task-canvas');
        const ctx = canvas.getContext('2d');

        function initTask() {
            const inputVal = document.getElementById('participant-id').value.trim();
            participantId = inputVal || "User-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            
            document.getElementById('welcome-screen').style.display = 'none';
            canvas.style.display = 'block';
            resizeCanvas();
            spawnCircle();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function spawnCircle() {
            if (currentTrial >= totalTrials) {
                finishExperiment();
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            setTimeout(() => {
                const margin = circle.r + 50;
                circle.x = Math.random() * (canvas.width - margin * 2) + margin;
                circle.y = Math.random() * (canvas.height - margin * 2) + margin;
                ctx.beginPath();
                ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);
                ctx.fillStyle = "#ff4757";
                ctx.fill();
                ctx.closePath();
                startTime = performance.now();
            }, 500);
        }

        canvas.addEventListener('click', (e) => {
            if (startTime === 0) return;
            const dist = Math.sqrt((e.clientX - circle.x)**2 + (e.clientY - circle.y)**2);
            if (dist <= circle.r) {
                const rt = Math.round(performance.now() - startTime);
                startTime = 0;
                sessionRTs.push(rt);
                currentTrial++;
                
                fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        Participant_ID: participantId,
                        Trial_Number: currentTrial,
                        Reaction_Time: rt
                    })
                });
                spawnCircle();
            }
        });

        async function finishExperiment() {
            canvas.style.display = 'none';
            document.getElementById('results-screen').style.display = 'flex';
            const userAvg = sessionRTs.reduce((a, b) => a + b, 0) / sessionRTs.length;

            try {
                const response = await fetch(WEB_APP_URL);
                if (!response.ok) throw new Error('Fetch failed');
                const history = await response.json();

                document.getElementById('stats-summary').innerHTML = 
                    `Your Average: <span class="avg-highlight">${userAvg.toFixed(1)} ms</span><br>` +
                    `<small>Compared against ${history.length} global trials.</small>`;

                renderChart(history, userAvg);
            } catch (e) {
                document.getElementById('stats-summary').innerHTML = "No historical data yet. You're the first!<br>" + 
                `Your Average: <span class="avg-highlight">${userAvg.toFixed(1)} ms</span>`;
                renderChart(sessionRTs, userAvg); // Fallback to current session
            }
        }

        function renderChart(data, userAvg) {
            const ctxChart = document.getElementById('rtHistogram').getContext('2d');
            const binSize = 50;
            const bins = {};
            
            data.forEach(val => {
                const b = Math.floor(val / binSize) * binSize;
                bins[b] = (bins[b] || 0) + 1;
            });

            const labels = Object.keys(bins).sort((a, b) => a - b);
            const counts = labels.map(l => bins[l]);

            new Chart(ctxChart, {
                type: 'bar',
                data: {
                    labels: labels.map(l => l + "ms"),
                    datasets: [{
                        label: 'Frequency',
                        data: counts,
                        backgroundColor: 'rgba(0, 123, 255, 0.4)',
                        borderColor: '#007bff',
                        borderWidth: 1,
                        barPercentage: 1,
                        categoryPercentage: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                },
                plugins: [{
                    afterDraw: chart => {
                        const {ctx, scales: {x, y}} = chart;
                        const xPixel = x.getPixelForValue(Math.floor(userAvg / binSize) * binSize + "ms");
                        if (xPixel) {
                            ctx.save();
                            ctx.strokeStyle = '#d9534f';
                            ctx.lineWidth = 3;
                            ctx.setLineDash([5, 5]);
                            ctx.beginPath();
                            ctx.moveTo(xPixel, y.top);
                            ctx.lineTo(xPixel, y.bottom);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                }]
            });
        }
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
