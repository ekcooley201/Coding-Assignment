<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Experiment & Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa; color: #333;
        }

        /* Screen 1 & 3 Containers */
        .full-screen {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; text-align: center;
        }

        .card {
            background: white; padding: 2.5rem; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 600px;
        }

        input {
            padding: 12px; font-size: 1rem; border: 2px solid #dee2e6;
            border-radius: 8px; margin-bottom: 1.5rem; width: 100%;
            box-sizing: border-box; outline: none;
        }

        button {
            padding: 12px 24px; font-size: 1rem; background-color: #007bff;
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; width: 100%;
        }

        /* Screen 2: Task Canvas */
        #task-canvas { display: none; background-color: #ffffff; cursor: crosshair; }

        /* Chart Styling */
        #results-screen { display: none; overflow-y: auto; padding: 20px 0; }
        .chart-container { position: relative; margin: auto; height: 40vh; width: 100%; }
        .stats-summary { margin-bottom: 20px; font-size: 1.2rem; }
        .avg-highlight { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

    <div id="welcome-screen" class="full-screen">
        <div class="card">
            <h1>Reaction Task</h1>
            <p>Click the circles as fast as possible (10 trials).<br>Your results will be compared to our database at the end.</p>
            <input type="text" id="participant-id" placeholder="Enter Participant ID (Optional)">
            <button onclick="initTask()">Start Task</button>
        </div>
    </div>

    <canvas id="task-canvas"></canvas>

    <div id="results-screen" class="full-screen">
        <div class="card">
            <h2>Experiment Complete</h2>
            <div id="stats-summary" class="stats-summary">Processing your data...</div>
            <div class="chart-container">
                <canvas id="rtHistogram"></canvas>
            </div>
            <button onclick="location.reload()" style="margin-top: 20px; background-color: #6c757d;">Restart</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxJtpruPGDAORjaSgxWIVd1vkY_0lS0TExF2bQLxZrepd2tCF3OTsA_60y1AeqU1fM4/exec";
        
        let participantId = "";
        let sessionRTs = [];
        let currentTrial = 0;
        const totalTrials = 10;
        let startTime = 0;
        let circle = { x: 0, y: 0, r: 50 };
        
        const canvas = document.getElementById('task-canvas');
        const ctx = canvas.getContext('2d');

        function initTask() {
            const inputVal = document.getElementById('participant-id').value.trim();
            participantId = inputVal || "User-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            
            document.getElementById('welcome-screen').style.display = 'none';
            canvas.style.display = 'block';
            resizeCanvas();
            spawnCircle();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function spawnCircle() {
            if (currentTrial >= totalTrials) {
                finishExperiment();
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            setTimeout(() => {
                const margin = circle.r + 30;
                circle.x = Math.random() * (canvas.width - margin * 2) + margin;
                circle.y = Math.random() * (canvas.height - margin * 2) + margin;

                ctx.beginPath();
                ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);
                ctx.fillStyle = "#007bff";
                ctx.fill();
                ctx.closePath();
                startTime = performance.now();
            }, 500);
        }

        canvas.addEventListener('click', (e) => {
            if (startTime === 0) return;
            const dist = Math.sqrt((e.clientX - circle.x)**2 + (e.clientY - circle.y)**2);
            if (dist <= circle.r) {
                const rt = Math.round(performance.now() - startTime);
                startTime = 0;
                sessionRTs.push(rt);
                currentTrial++;
                
                // Immediate individual trial post
                fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        Participant_ID: participantId,
                        Trial_Number: currentTrial,
                        Reaction_Time: rt
                    })
                });

                spawnCircle();
            }
        });

        async function finishExperiment() {
            canvas.style.display = 'none';
            document.getElementById('results-screen').style.display = 'flex';

            // 1. Calculate user average
            const userAvg = sessionRTs.reduce((a, b) => a + b, 0) / sessionRTs.length;

            try {
                // 2. Get Historical Data
                const response = await fetch(WEB_APP_URL);
                const history = await response.json();

                document.getElementById('stats-summary').innerHTML = 
                    `Your Average RT: <span class="avg-highlight">${userAvg.toFixed(1)} ms</span><br>` +
                    `<small>Compared to ${history.length} global trials</small>`;

                // 3. Plot Histogram
                generateHistogram(history, userAvg);
            } catch (e) {
                document.getElementById('stats-summary').innerText = "Error loading comparison data.";
                console.error(e);
            }
        }

        function generateHistogram(data, userAvg) {
            const ctxChart = document.getElementById('rtHistogram').getContext('2d');
            
            // Bin the data for a histogram effect (50ms buckets)
            const binSize = 50;
            const bins = {};
            data.forEach(val => {
                const bin = Math.floor(val / binSize) * binSize;
                bins[bin] = (bins[bin] || 0) + 1;
            });

            const labels = Object.keys(bins).sort((a, b) => a - b);
            const counts = labels.map(label => bins[label]);

            new Chart(ctxChart, {
                type: 'bar',
                data: {
                    labels: labels.map(l => `${l}ms`),
                    datasets: [{
                        label: 'Frequency of All Users',
                        data: counts,
                        backgroundColor: 'rgba(0, 123, 255, 0.5)',
                        borderColor: '#007bff',
                        borderWidth: 1,
                        barPercentage: 1,
                        categoryPercentage: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'Number of Trials' } },
                        x: { title: { display: true, text: 'Reaction Time (ms)' } }
                    },
                    plugins: {
                        // Custom plugin to draw the vertical line for user average
                        annotation: {
                            // Annotation plugin would be cleaner, but we can use a basic line hack
                        }
                    }
                },
                plugins: [{
                    afterDraw: chart => {
                        const {ctx, scales: {x, y}} = chart;
                        // Find the x-coordinate for the user's average
                        const xPixel = x.getPixelForValue(Math.floor(userAvg / binSize) * binSize + "ms");
                        
                        ctx.save();
                        ctx.strokeStyle = '#d9534f';
                        ctx.lineWidth = 3;
                        ctx.setLineDash([5, 5]);
                        ctx.beginPath();
                        ctx.moveTo(xPixel, y.top);
                        ctx.lineTo(xPixel, y.bottom);
                        ctx.stroke();
                        
                        ctx.fillStyle = '#d9534f';
                        ctx.font = 'bold 12px Arial';
                        ctx.fillText('YOU', xPixel - 12, y.top - 5);
                        ctx.restore();
                    }
                }]
            });
        }

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
